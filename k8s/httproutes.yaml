apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: catalog-route
  namespace: azure-sre-agent-demo-lab
spec:
  parentRefs:
    - name: azure-sre-agent-demo-lab-gateway
      namespace: azure-sre-agent-demo-lab
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /catalog
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: catalog-service
          port: 80
---
