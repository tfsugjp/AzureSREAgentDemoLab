# Secret template — copy this file to k8s/secrets.yaml and replace the placeholders
# with real values before applying, OR create the secrets with kubectl as described in
# the README ("Update Kubernetes secrets" step).
# If you create the secrets via kubectl, do NOT apply this template (it would overwrite them).
# Note: k8s/secrets.yaml is gitignored so real values are never committed.
apiVersion: v1
kind: Secret
metadata:
  name: cosmos-db-secret
  namespace: azure-sre-agent-demo-lab
type: Opaque
stringData:
  ConnectionString: "<YOUR_COSMOS_DB_CONNECTION_STRING>"
---
apiVersion: v1
kind: Secret
metadata:
  name: entra-id-secret
  namespace: azure-sre-agent-demo-lab
type: Opaque
stringData:
  TenantId: "<YOUR_TENANT_ID>"
  ClientId: "<YOUR_CLIENT_ID>"
  Audience: "<YOUR_AUDIENCE>"
