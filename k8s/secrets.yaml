# Secret テンプレート — プレースホルダーを実際の値に置き換えてから apply するか、
# README の「2-5. Kubernetes シークレットの更新」手順で kubectl コマンドを使って作成してください。
# kubectl コマンドで作成した場合は、このファイルを apply しないでください (上書きされます)。
apiVersion: v1
kind: Secret
metadata:
  name: cosmos-db-secret
  namespace: global-azure-demo
type: Opaque
stringData:
  ConnectionString: "<YOUR_COSMOS_DB_CONNECTION_STRING>"
---
apiVersion: v1
kind: Secret
metadata:
  name: entra-id-secret
  namespace: global-azure-demo
type: Opaque
stringData:
  TenantId: "<YOUR_TENANT_ID>"
  ClientId: "<YOUR_CLIENT_ID>"
  Audience: "<YOUR_AUDIENCE>"
