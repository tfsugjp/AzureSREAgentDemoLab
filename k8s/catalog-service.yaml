apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: global-azure-demo
  labels:
    app: catalog-service
    app.kubernetes.io/part-of: global-azure-demo-2026
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: <ACR_NAME>.azurecr.io/catalog-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: CosmosDb__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: cosmos-db-secret
                  key: ConnectionString
            - name: CosmosDb__DatabaseName
              value: "GlobalAzureDemo"
            - name: AzureAd__Instance
              value: "https://login.microsoftonline.com/"
            - name: AzureAd__TenantId
              valueFrom:
                secretKeyRef:
                  name: entra-id-secret
                  key: TenantId
            - name: AzureAd__ClientId
              valueFrom:
                secretKeyRef:
                  name: entra-id-secret
                  key: ClientId
            - name: AzureAd__Audience
              valueFrom:
                secretKeyRef:
                  name: entra-id-secret
                  key: Audience
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: global-azure-demo
spec:
  selector:
    app: catalog-service
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
