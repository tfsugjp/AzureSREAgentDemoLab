name: global-azure-demo2026
metadata:
  template: global-azure-demo2026@0.0.1
infra:
  provider: bicep
  path: infra
  module: main
hooks:
  postprovision:
    windows:
      shell: pwsh
      run: scripts/setup-ai-search.ps1
    posix:
      shell: bash
      run: scripts/setup-ai-search.sh
services:
  catalog:
    resourceName: ${CATALOG_SERVICE_NAME}
    project: ./src/CatalogService
    module: main
    language: dotnet
    host: containerapp
    apiVersion: 2026-01-01
    docker:
      path: ./Dockerfile
      context: ../..
  order:
    resourceName: ${ORDER_SERVICE_NAME}
    project: ./src/OrderService
    module: main
    language: dotnet
    host: containerapp
    apiVersion: 2026-01-01
    docker:
      path: ./Dockerfile
      context: ../..
  notification:
    resourceName: ${NOTIFICATION_SERVICE_NAME}
    project: ./src/NotificationService
    module: main
    language: dotnet
    host: containerapp
    apiVersion: 2026-01-01
    docker:
      path: ./Dockerfile
      context: ../..